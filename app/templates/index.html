<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGP Looking Glass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background-color: #f4f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 800px;
            margin-top: 50px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-label {
            font-weight: 500;
            color: #34495e;
        }
        .form-select, .form-control {
            border-radius: 5px;
            border: 1px solid #ced4da;
            padding: 10px;
        }
        .btn-primary {
            background-color: #3498db;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #2980b9;
        }
        #variables {
            margin-top: 20px;
        }
        #result {
            margin-top: 30px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #e9ecef;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .input-group-text {
            background-color: #e9ecef;
        }
        #loading {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-network-wired me-2"></i>BGP Looking Glass</h1>
        <form id="bgpForm">
            <div class="mb-3">
                <label for="device" class="form-label">Select Device</label>
                <select name="device" id="device" class="form-select" required>
                    <option value="" disabled selected>Select a device</option>
                    {% for group_name, group_devices in devices|groupby('group') %}
                        <optgroup label="{{ group_name|default('Ungrouped') }}">
                            {% for device in group_devices %}
                                <option value="{{ device.name }}">{{ device.name }}</option>
                            {% endfor %}
                        </optgroup>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="command" class="form-label">Select Command</label>
                <select name="command" id="command" class="form-select" required>
                    <option value="" disabled selected>Select a command</option>
                </select>
            </div>

            <div id="variables" class="mb-3"></div>

            <button type="submit" class="btn btn-primary" id="executeBtn">
                <i class="fas fa-play me-2"></i>Execute
            </button>
        </form>

        <div id="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <span class="ms-2">Running command, please wait...</span>
        </div>

        <div id="result" class="mt-4"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            var variableValues = {};

            $('#variables').on('input', 'input', function() {
                var name = $(this).attr('name');
                variableValues[name] = $(this).val();
            });

            $('#device').change(function() {
                var device = $(this).val();
                console.log('Device selected:', device);  // Debug log
                if (!device) {
                    $('#command').empty().append('<option value="" disabled selected>Select a command</option>');
                    $('#variables').empty();
                    variableValues = {};
                    return;
                }
                $.ajax({
                    url: '/get_allowed_commands',
                    data: {device: device},
                    success: function(data) {
                        console.log('Commands data received:', data);  // Debug log for full response
                        var commandSelect = $('#command');
                        commandSelect.empty().append('<option value="" disabled selected>Select a command</option>');
                        if (data.commands && Object.keys(data.commands).length > 0) {
                            $.each(data.commands, function(cmd_name, cmd) {
                                var displayText = cmd.display_name || cmd_name;  // Use display_name if available
                                commandSelect.append($('<option>').val(cmd_name).text(displayText));
                            });
                        } else {
                            console.error('No commands in response or response is empty:', data);  // More detailed error log
                        }
                        $('#command').trigger('change');
                    },
                    error: function(xhr) {
                        console.error('Error loading commands:', xhr.responseText, xhr.status);  // Error log with status
                        $('#result').html('<div class="alert alert-danger">Error loading commands: ' + xhr.status + '</div>');
                    }
                });
            });

            $('#command').change(function() {
                var command = $(this).val();
                if (!command) {
                    $('#variables').empty();
                    return;
                }
                $.ajax({
                    url: '/get_variables',
                    data: {command: command},
                    success: function(data) {
                        var variablesDiv = $('#variables');
                        variablesDiv.empty();
                        if (data.variables) {
                            data.variables.forEach(function(varObj) {
                                var inputValue = variableValues[varObj.name] || '';
                                variablesDiv.append(`
                                    <div class="input-group mb-2">
                                        <span class="input-group-text">${varObj.name}</span>
                                        <input type="text" name="${varObj.name}" class="form-control" placeholder="Enter ${varObj.name}" value="${inputValue}">
                                    </div>
                                `);
                            });
                        }
                    },
                    error: function(xhr) {
                        console.error('Error loading variables:', xhr.responseText);
                        $('#result').html('<div class="alert alert-danger">Error loading variables</div>');
                    }
                });
            });

            $('#bgpForm').submit(function(e) {
                e.preventDefault();
                var formData = $(this).serialize();
                var device = $('#device').val();
                var command = $('#command').val();
                if (!device || !command) {
                    $('#result').html('<div class="alert alert-danger">Please select a device and command</div>');
                    return;
                }
                $('#loading').show();
                $('#device, #command, #variables input, #executeBtn').prop('disabled', true);
                $.ajax({
                    url: '/execute',
                    type: 'POST',
                    data: formData,
                    success: function(data) {
                        console.log('Execute response:', data);  // Add debug log for execute response
                        if (data.error) {
                            $('#result').html('<div class="alert alert-danger">' + data.error + '</div>');
                        } else if (data.output) {
                            $('#result').text(data.output);
                        } else {
                            $('#result').html('<div class="alert alert-warning">No output returned.</div>');
                        }
                    },
                    error: function(xhr) {
                        var errorMsg = xhr.responseJSON ? xhr.responseJSON.error : 'Error executing command';
                        $('#result').html('<div class="alert alert-danger">' + errorMsg + '</div>');
                    },
                    complete: function() {
                        $('#loading').hide();
                        $('#device, #command, #variables input, #executeBtn').prop('disabled', false);
                    }
                });
            });
        });
    </script>
</body>
</html>
